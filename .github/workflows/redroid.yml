name: Redroid Samsung A22 Ultimate

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-24.04-arm
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: System Setup
        run: |
          sudo apt-get update
          sudo apt-get install -y docker.io adb
          curl -L --output cloudflared.deb https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-arm64.deb
          sudo dpkg -i cloudflared.deb

      - name: Build Image
        run: |
          docker build -t redroid-a22-final .

      - name: Run Emulator
        run: |
          docker run -d --privileged \
            --name redroid \
            -p 5555:5555 \
            redroid-a22-final \
            androidboot.redroid_gpu_mode=guest \
            androidboot.hardware=redroid \
            androidboot.secure=0 \
            androidboot.selinux=permissive

      - name: Post-Boot Configuration
        run: |
          adb connect localhost:5555
          adb wait-for-device
          # تشغيل سكريبت التزوير
          adb shell sh /system/bin/setup_spoofing.sh
          
          # تفعيل Zygisk في Magisk لتمرير Play Integrity
          adb shell "su -c 'magisk --zygisk enable'"
          adb shell "su -c 'magisk --denylist add com.google.android.gms'"
          adb shell "su -c 'magisk --denylist add com.google.android.vending'"
          
          # إعادة تشغيل الحاوية لتفعيل Zygisk
          docker restart redroid

      - name: Remote Access (Web-Scrcpy + Cloudflared)
        run: |
          docker run -d --name scrcpy -p 8000:8000 --link redroid:redroid mobiledo/ws-scrcpy
          cloudflared tunnel --url http://localhost:8000 > tunnel.log 2>&1 &
          sleep 20
          URL=$(grep -o 'https://.*\.trycloudflare\.com' tunnel.log | head -n 1)
          echo "Access your Samsung A22 Emulator here: $URL"

      - name: Tmate Debug Session
        uses: mxschmitt/action-tmate@v3
        if: always()
